name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# LOW-2: pin action versions to SHAs (SLSA supply-chain hardening).
# Update SHAs when upgrading actions; confirm SHA for the desired tag via the GitHub UI or
# `gh api repos/actions/checkout/git/ref/refs/tags/v4.2.2`.
# actions/checkout v4.2.2   → 11bd71901bbe5b1630ceea73d27597364c9af683
# actions/setup-node v4.2.0 → 39370e3970a6d050c480ffad4ff0ed4d3fdee5af

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # checkout only — no write access needed for CI
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Use Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.2.0
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - name: Audit dependencies (LOW-2)
        # Fail the build on HIGH or CRITICAL vulnerabilities in production deps.
        # Adjust to --audit-level=moderate once the backlog is clear.
        run: npm audit --audit-level=high
      - name: Build (TypeScript)
        run: npm run build
      - name: Test
        run: npm test
      - name: End-to-end demo (smoke)
        run: npm run demo
